<style>
  :root{--ink:#000000;--navy:#161616;--steel:#E8E8E8;--ice:#FFFFFF;--paper:#F4F4F4;--muted:#9A9A9A;--hair:rgba(255,255,255,.14)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{

  }

  .top{padding:22px 28px}
  .back{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:.74rem;color:var(--ice);display:inline-flex;align-items:center;gap:8px}

     color:#fff}

  .btn{display:inline-flex;align-items:center;gap:9px;margin-top:34px;
    font-family:'Oswald',sans-serif;font-weight:500;text-transform:uppercase;letter-spacing:.13em;font-size:.86rem;
    padding:15px 28px;border-radius:999px;background:#fff;color:#0A0A0A;
    box-shadow:0 8px 24px rgba(0,0,0,.5);transition:.2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,255,255,.25)}
  footer{padding:30px 28px;text-align:center;font-size:.74rem;color:var(--muted);letter-spacing:.04em}

  <div class="top"><a class="back" href="index.html">← Back</a></div>

  <script>document.getElementById('yr').textContent=new Date().getFullYear();</script>
