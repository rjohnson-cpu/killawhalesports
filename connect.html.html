<style>
  :root{--ink:#000000;--navy:#161616;--steel:#E8E8E8;--ice:#FFFFFF;--paper:#F4F4F4;--muted:#9A9A9A;--hair:rgba(255,255,255,.14)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:
      radial-gradient(60% 50% at 50% 30%, rgba(255,255,255,.14), transparent 70%),
      linear-gradient(180deg,#141414,#050505);
    color:var(--paper);font-family:'Inter',system-ui,sans-serif;line-height:1.6;
    min-height:100svh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  .top{padding:22px 28px}
  .back{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:.74rem;color:var(--ice);display:inline-flex;align-items:center;gap:8px}
  .back:hover{color:#fff}
  main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 28px 80px}
  .card{max-width:560px}
  .card img{width:84px;margin-bottom:26px;filter:drop-shadow(0 10px 30px rgba(0,0,0,.55))}
  .eyebrow{font-family:'Oswald',sans-serif;font-weight:500;text-transform:uppercase;letter-spacing:.32em;font-size:.72rem;color:var(--ice);margin-bottom:10px}
  h1{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(2.6rem,9vw,4.4rem);line-height:1;
     color:#fff}

  .btn{display:inline-flex;align-items:center;gap:9px;margin-top:34px;
    font-family:'Oswald',sans-serif;font-weight:500;text-transform:uppercase;letter-spacing:.13em;font-size:.86rem;
